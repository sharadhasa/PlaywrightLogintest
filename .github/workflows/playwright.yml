name: Playwright Tests

on:
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Create .env for CI
        run: |
          echo "BASE_URL=${{ secrets.BASE_URL }}" > .env
          echo "AUTH_USERNAME=${{ secrets.AUTH_USERNAME }}" >> .env
          echo "AUTH_PASSWORD=${{ secrets.AUTH_PASSWORD }}" >> .env

      - name: Check API connectivity
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          AUTH_USERNAME: ${{ secrets.AUTH_USERNAME }}
          AUTH_PASSWORD: ${{ secrets.AUTH_PASSWORD }}
        run: |
          echo "Checking API..."
          curl -v --max-time 15 -u "$AUTH_USERNAME:$AUTH_PASSWORD" "$BASE_URL/login"

      - name: Run ONE test only
        run: npx playwright test ninjapomv1/LoginAPIv1.spec.ts --workers=1
