name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
  schedule:
    - cron: '30 8 * * 1-5'

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Create .env for CI
        run: |
          echo "BASE_URL=${{ secrets.BASE_URL }}" >> .env
          echo "AUTH_USERNAME=${{ secrets.AUTH_USERNAME }}" >> .env
          echo "AUTH_PASSWORD=${{ secrets.AUTH_PASSWORD }}" >> .env

      - name: Check API connectivity
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          AUTH_USERNAME: ${{ secrets.AUTH_USERNAME }}
          AUTH_PASSWORD: ${{ secrets.AUTH_PASSWORD }}
        run: |
          echo "Checking API reachability..."
          curl -v --max-time 20 -u "$AUTH_USERNAME:$AUTH_PASSWORD" "$BASE_URL/login" || true

      - name: Run Playwright tests
        run: npx playwright test ninjapomv1 --workers=1

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
