name: Playwright UI Login Test

on:
  workflow_dispatch:

jobs:
  ui-test:
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Create .env for CI
        run: |
          echo "BASE_URL=${{ secrets.BASE_URL }}" > .env
          echo "AUTH_USERNAME=${{ secrets.AUTH_USERNAME }}" >> .env
          echo "AUTH_PASSWORD=${{ secrets.AUTH_PASSWORD }}" >> .env

      - name: Run UI login test only
        run: npx playwright test ninjapomv1/Loginv1.spec.ts --workers=1

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-ui-login
          path: playwright-report/
          retention-days: 30
