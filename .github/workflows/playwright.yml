name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
  schedule:
    - cron: '30 8 * * 1-5'

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Create .env for CI
        run: |
          echo "BASE_URL=${{ secrets.BASE_URL }}" > .env
          echo "AUTH_USERNAME=${{ secrets.AUTH_USERNAME }}" >> .env
          echo "AUTH_PASSWORD=${{ secrets.AUTH_PASSWORD }}" >> .env

      - name: Check application availability
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
        run: |
          echo "Checking if app is reachable..."
          curl -I --max-time 20 "$BASE_URL"

      - name: Clean old reports
        run: |
          rm -rf allure-results
          rm -rf allure-report
          rm -rf playwright-report

      - name: Run Playwright tests
        run: npx playwright test ninjapomv1 --workers=1

      - name: Upload Playwright HTML Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30

